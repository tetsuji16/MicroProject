name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          override: true
      - name: Build TAURI project (dry run)
        run: |
          cd projectlibre-tauri
          cargo build
      - name: Lint (rustfmt)
        run: |
          cargo fmt -- --check
      - name: Echo
        run: echo "CI placeholder for TAURI build"
