[package]
name = "projectlibre_tauri"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
tauri = { version = "1" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
projectlibre_tauri_backend = { path = "backend" }
roxmltree = "0.20"
base64 = "0.22"

[build-dependencies]
tauri-build = { version = "1" }

[dev-dependencies]
tempfile = "3"
